<title>Elite IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal-deep:   #0f3d47;
    --teal-mid:    #1a5f6e;
    --teal-light:  #2a8a9f;
    --teal-glow:   #3ab5cc;
    --white:       #ffffff;
    --white-80:    rgba(255,255,255,0.80);
    --white-20:    rgba(255,255,255,0.12);
    --white-10:    rgba(255,255,255,0.07);
    --card-bg:     rgba(255,255,255,0.97);
    --user-bubble: rgba(10,50,60,0.85);
    --text-dark:   #0f1e22;
    --text-muted:  #6b8a90;
    --radius-lg:   18px;
    --radius-md:   12px;
    --radius-sm:   8px;
  }

  html, body { height: 100%; min-height: -webkit-fill-available; font-family: 'Inter', sans-serif; background: var(--teal-deep); color: var(--white); overflow: hidden; }

  /* ─── SHIELD SVG INLINE ─── */
  .shield-icon { display: inline-block; }

  /* ─── LOGIN ─── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 30%, #1e6a7a 0%, #0d3540 60%, #081c24 100%);
  }
  .login-logo { margin-bottom: 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .shield-svg-lg { width: 96px; height: 96px; filter: drop-shadow(0 0 24px rgba(58,181,204,0.4)); }
  .login-title { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: var(--white); }
  .login-title span { color: var(--teal-glow); }
  .login-subtitle { font-size: 13px; color: var(--white-80); letter-spacing: 0.5px; text-align: center; margin-top: -8px; margin-bottom: 8px; }
  .login-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(20px); border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 380px; }
  .login-card label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.8px; color: var(--teal-glow); margin-bottom: 6px; text-transform: uppercase; }
  .login-card input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif; margin-bottom: 18px; outline: none; transition: border-color 0.2s; }
  .login-card input:focus { border-color: var(--teal-glow); }
  .login-card input::placeholder { color: rgba(255,255,255,0.35); }
  .btn-login { width: 100%; background: linear-gradient(135deg, var(--teal-light), var(--teal-glow)); border: none; border-radius: var(--radius-sm); padding: 14px; color: var(--white); font-size: 15px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
  .login-error { color: #ff7b7b; font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* ─── CHAT SCREEN ─── */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
    max-width: 600px;
    margin: 0 auto;
    background: linear-gradient(180deg, var(--teal-deep) 0%, #0d3540 100%);
    position: relative;
  }

  /* ─── SIDEBAR MENU ─── */
  #sidebar {
    position: fixed;
    top: 0; left: -280px;
    width: 280px;
    height: 100vh;
    background: #0a2d36;
    border-right: 1px solid var(--white-20);
    z-index: 100;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  #sidebar.open { left: 0; }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sidebar-overlay.visible { opacity: 1; pointer-events: all; }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--white-20);
  }
  .sidebar-logo-text { font-size: 18px; font-weight: 700; letter-spacing: 1.5px; }
  .sidebar-logo-text span { color: var(--teal-glow); }

  .sidebar-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    padding: 18px 20px 6px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    font-size: 14px;
    color: var(--white-80);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .sidebar-item:hover { background: var(--white-10); color: var(--white); }
  .sidebar-item.active { background: rgba(58,181,204,0.12); color: var(--teal-glow); }
  .sidebar-item svg { flex-shrink: 0; opacity: 0.7; }
  .sidebar-item:hover svg, .sidebar-item.active svg { opacity: 1; }

  .sidebar-item .badge {
    margin-left: auto;
    background: var(--teal-glow);
    color: #0a2d36;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.3px;
  }

  .sidebar-divider { height: 1px; background: var(--white-20); margin: 8px 0; }

  .sidebar-recent-item {
    padding: 9px 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .sidebar-recent-item:hover { color: var(--white); }
  .sidebar-recent-item.highlighted { background: rgba(58,181,204,0.1); color: var(--white); border-radius: 6px; }

  .sidebar-footer {
    margin-top: auto;
    border-top: 1px solid var(--white-20);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-user { display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--teal-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .sidebar-username { font-size: 13px; font-weight: 600; }
  .btn-logout-sidebar { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 4px; transition: color 0.2s; }
  .btn-logout-sidebar:hover { color: var(--white); }

  /* ─── HEADER ─── */
  .chat-header {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--white-20);
    flex-shrink: 0;
  }
  .btn-menu {
    background: none;
    border: none;
    color: var(--white);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .header-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .header-shield-sm { width: 28px; height: 28px; }
  .header-name { font-size: 17px; font-weight: 700; letter-spacing: 1.5px; }
  .header-name span { color: var(--teal-glow); }
  .btn-new-chat {
    margin-left: 14px;
    background: none;
    border: none;
    color: var(--white-80);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .btn-new-chat:hover { color: var(--white); }

  /* ─── MESSAGES ─── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--white-20); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .msg-sender { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; color: var(--white-80); }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(255,255,255,0.15); color: var(--white); border-radius: 16px 16px 4px 16px; padding: 12px 16px; font-size: 14px; line-height: 1.5; }
  .msg.ai .bubble { background: var(--card-bg); color: var(--text-dark); border-radius: 16px 16px 16px 4px; padding: 14px 16px; font-size: 14px; line-height: 1.6; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .msg.ai .bubble strong { color: var(--teal-mid); }
  .msg.ai .bubble ul { padding-left: 18px; margin: 6px 0; }
  .msg.ai .bubble li { margin-bottom: 4px; }

  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 7px; height: 7px; background: var(--teal-light); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .welcome-msg { text-align: center; padding: 20px 10px 10px; color: var(--white-80); font-size: 13px; line-height: 1.6; }
  .welcome-msg strong { color: var(--teal-glow); display: block; font-size: 16px; margin-bottom: 6px; }

  .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
  .quick-action { background: var(--white-10); border: 1px solid var(--white-20); border-radius: 12px; padding: 10px 14px; color: var(--white); font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; text-align: center; transition: background 0.2s; max-width: 160px; }
  .quick-action:hover { background: var(--white-20); }
  .quick-action .qa-icon { display: flex; justify-content: center; margin-bottom: 6px; opacity: 0.9; }

  /* ─── INPUT AREA ─── */
  .chat-input-area { padding: 10px 16px 18px; border-top: 1px solid var(--white-20); flex-shrink: 0; }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 24px;
    padding: 8px 12px 8px 14px;
  }

  /* Botão clipe slim */
  .btn-attach {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    display: flex;
    align-items: center;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .btn-attach:hover { color: var(--white); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--white);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }
  #msg-input::placeholder { color: rgba(255,255,255,0.35); }

  /* Botão microfone slim */
  .btn-mic {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    display: flex;
    align-items: center;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .btn-mic:hover { color: var(--white); }

  /* Botão enviar */
  .btn-send {
    background: var(--teal-glow);
    border: none;
    cursor: pointer;
    color: #0a2d36;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-send:hover { background: var(--white); }
  .btn-send:active { transform: scale(0.93); }

  .input-hint { font-size: 10px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 7px; }

  .btn-view-toggle {
    background: none;
    border: none;
    color: var(--white-80);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .btn-view-toggle:hover { color: var(--white); }
  .btn-new-chat { margin-left: 0; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
  }

  /* Modo desktop — chat mais largo */
  #chat-screen.desktop-mode {
    max-width: 100%;
  }
  #chat-screen.desktop-mode .chat-messages {
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  #chat-screen.desktop-mode .chat-input-area {
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  #chat-screen.desktop-mode .msg { max-width: 70%; }


  /* iOS inputs */
  input, textarea {
    -webkit-user-select: text;
    user-select: text;
    font-size: 16px;
  }





  /* Standalone — safe areas universais (adapta a qualquer dispositivo) */
  .ios-standalone .chat-header {
    padding-top: calc(14px + env(safe-area-inset-top));
  }
  .ios-standalone .chat-input-area {
    padding-bottom: calc(18px + env(safe-area-inset-bottom));
  }
  .ios-standalone #login-screen {
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .ios-standalone .sidebar-header {
    padding-top: calc(20px + env(safe-area-inset-top));
  }






  /* ── ELITE IA THINKING STREAM ── */

  .ts-wrap {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    align-self: flex-start;
    max-width: 85%;
  }

  /* Escudo à esquerda — fora da caixa, igual asterisco do Claude */
  .ts-shield {
    flex-shrink: 0;
    width: 30px;
    height: 36px;
    position: relative;
    margin-top: 2px;
  }
  .ts-shield svg.sh-bg {
    position: absolute;
    inset: 0;
    width: 30px;
    height: 36px;
  }
  /* Área de clip dos flocos */
  .ts-scene {
    position: absolute;
    top: 7px; left: 4px;
    width: 22px; height: 22px;
    overflow: hidden;
  }

  /* Cada floco — trajetória ondulada diferente */
  .ts-fk {
    position: absolute;
    width: 6px; height: 6px;
    opacity: 0;
  }
  .ts-fk svg { width: 100%; height: 100%; }

  /* Floco 0: passa no topo, ondula para baixo no meio */
  @keyframes wave0 {
    0%   { left: -7px; top: 2px;  opacity: 0;   }
    12%  { opacity: 1; }
    30%  { top: 9px; }
    50%  { top: 3px; }
    70%  { top: 10px; }
    88%  { opacity: 1; }
    100% { left: 24px; top: 4px;  opacity: 0;   }
  }
  /* Floco 1: passa no meio, ondula diferente */
  @keyframes wave1 {
    0%   { left: -7px; top: 9px;  opacity: 0;   }
    12%  { opacity: 1; }
    30%  { top: 2px; }
    50%  { top: 11px; }
    70%  { top: 4px; }
    88%  { opacity: 1; }
    100% { left: 24px; top: 8px;  opacity: 0;   }
  }
  /* Floco 2: passa embaixo, ondula para cima */
  @keyframes wave2 {
    0%   { left: -7px; top: 16px; opacity: 0;   }
    12%  { opacity: 1; }
    30%  { top: 9px; }
    50%  { top: 16px; }
    70%  { top: 8px; }
    88%  { opacity: 1; }
    100% { left: 24px; top: 15px; opacity: 0;   }
  }

  .ts-fk:nth-child(1) { animation: wave0 2.6s ease-in-out infinite 0s; }
  .ts-fk:nth-child(2) { animation: wave1 2.6s ease-in-out infinite 0.85s; }
  .ts-fk:nth-child(3) { animation: wave2 2.6s ease-in-out infinite 1.7s; }

  /* Rastros de neve — pontinhos teal que somem */
  .ts-trail {
    position: absolute;
    width: 2.5px; height: 2.5px;
    border-radius: 50%;
    background: #3ab5cc;
    opacity: 0;
  }
  @keyframes tr0 { 0%{left:4px;top:4px;opacity:.6} 100%{left:4px;top:4px;opacity:0} }
  @keyframes tr1 { 0%{left:10px;top:12px;opacity:.5} 100%{left:10px;top:12px;opacity:0} }
  @keyframes tr2 { 0%{left:16px;top:6px;opacity:.6} 100%{left:16px;top:6px;opacity:0} }
  @keyframes tr3 { 0%{left:7px;top:16px;opacity:.4} 100%{left:7px;top:16px;opacity:0} }
  @keyframes tr4 { 0%{left:19px;top:14px;opacity:.5} 100%{left:19px;top:14px;opacity:0} }
  .ts-trail:nth-child(1) { animation: tr0 2.6s ease-out infinite 0.4s; }
  .ts-trail:nth-child(2) { animation: tr1 2.6s ease-out infinite 1.2s; }
  .ts-trail:nth-child(3) { animation: tr2 2.6s ease-out infinite 0.9s; }
  .ts-trail:nth-child(4) { animation: tr3 2.6s ease-out infinite 1.8s; }
  .ts-trail:nth-child(5) { animation: tr4 2.6s ease-out infinite 0.3s; }

  /* Floco fixo quando termina */
  .ts-fk-fixed {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
  }
  .ts-fk-fixed svg { width: 100%; height: 100%; opacity: 0.8; }
  .ts-shield.done .ts-scene  { display: none; }
  .ts-shield.done .ts-fk-fixed { display: block; }

  /* Coluna direita: label + texto único que muda */
  .ts-col { flex: 1; min-width: 0; }
  .ts-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--white-80);
    margin-bottom: 3px;
    letter-spacing: 0.3px;
  }
  .ts-msg {
    font-size: 13px;
    font-style: italic;
    color: rgba(255,255,255,0.5);
    line-height: 1.4;
    transition: opacity 0.3s ease;
  }
  .ts-msg.fade { opacity: 0; }

</style>

const SYSTEM_PROMPT = `Você é a Elite IA, assistente especializada em licitações públicas de sistemas VRF (Variable Refrigerant Flow) e ar condicionado no Brasil, desenvolvida pela Elite Ar Soluções em Engenharia Térmica.

function newChat() { conversationHistory = []; resetMessages(); }

function addMessage(role, content, isHTML = false) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = role === 'user' ? 'Você' : 'Elite IA';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) bubble.innerHTML = content; else bubble.textContent = content;
  div.appendChild(sender);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing-msg';
  const sender = document.createElement('div');
  sender.className = 'msg-sender'; sender.textContent = 'Elite IA';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  div.appendChild(sender); div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typing-msg'); if (el) el.remove(); }

function formatAIResponse(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/^- (.+)/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  return text;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);

  // Usar IA para interpretar a intenção — sem palavras-chave fixas
  const intencao = await interpretarIntencao(text);

  if (intencao.ehBusca) {
    if (intencao.uf) _ultimaUF = intencao.uf;
    if (intencao.dias) _ultimosDias = intencao.dias;
    _ultimoContexto = 'busca';
    await executarBuscaEditaisInteligente(intencao);
    return;
  }

  _ultimoContexto = null;
  conversationHistory.push({ role: 'user', content: text });
  addTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: SYSTEM_PROMPT, messages: conversationHistory })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'Erro ao obter resposta.';
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('assistant', formatAIResponse(reply), true);
  } catch (err) {
    removeTyping();
    addMessage('assistant', '⚠️ Erro de conexão. Verifique sua internet e tente novamente.');
  }
}

async function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  addMessage('user', `📎 Arquivo: ${file.name}`);
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Erro'));
    r.readAsDataURL(file);
  });
  const userMsg = { role: 'user', content: [
    { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
    { type: 'text', text: 'Analise este edital e extraia: valor estimado, prazo de execução/entrega, documentações exigidas, qualificação técnica, capacidade operacional e resumo do Termo de Referência.' }
  ]};
  conversationHistory.push(userMsg);
  addTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: SYSTEM_PROMPT, messages: conversationHistory })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'Erro ao processar PDF.';
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('assistant', formatAIResponse(reply), true);
  } catch (err) {
    removeTyping();
    addMessage('assistant', '⚠️ Erro ao processar o arquivo.');
  }
  input.value = '';
}

function startVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Reconhecimento de voz não suportado neste navegador. Use Chrome ou Safari.');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'pt-BR';
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  const micBtn = document.querySelector('.btn-mic');
  if (micBtn) micBtn.style.color = '#ff6b6b'; // vermelho = gravando

  rec.onstart = () => {
    if (micBtn) micBtn.style.color = '#ff6b6b';
  };

  rec.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const input = document.getElementById('msg-input');
    input.value = transcript;
    autoResize(input);
    if (micBtn) micBtn.style.color = '';
    // Enviar automaticamente após 600ms
    setTimeout(() => { if (input.value.trim()) sendMessage(); }, 600);
  };

  rec.onerror = (e) => {
    if (micBtn) micBtn.style.color = '';
    if (e.error !== 'no-speech') alert('Erro no microfone: ' + e.error);
  };

  rec.onend = () => {
    if (micBtn) micBtn.style.color = '';
  };

  try { rec.start(); } catch(e) { alert('Não foi possível iniciar o microfone.'); }
}


// ─── BUSCA PNCP ───
// Usa proxy CORS pois o PNCP bloqueia requisições diretas do navegador
const PNCP_BASE = 'https://pncp.gov.br/api/consulta/v1';
const CORS_PROXY = 'https://corsproxy.io/?url=';

const KEYWORDS_VRF = ['vrf', 'fluxo de refrigerante variável', 'fluxo de refrigerante variavel',
  'ar condicionado', 'ar-condicionado', 'condicionador de ar', 'climatiz', 'split',
  'sistema de refrigeração', 'sistema de refrigeracao', 'hvac', 'fancoil', 'fan coil',
  'fan-coil', 'chiller', 'self contained', 'cassete', 'condensadora', 'evaporadora',
  'multi split', 'multisplit'];

async function fetchPNCP(url) {
  // Lista de estratégias de conexão, tentadas em ordem
  const estrategias = [
    // 1) Direto (funciona se o PNCP permitir CORS)
    () => fetch(url),
    // 2) codetabs — não exige origem autorizada, funciona em qualquer lugar
    () => fetch('https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url)),
    // 3) allorigins (raw)
    () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)),
    // 4) corsproxy.io (funciona em github.io e origens autorizadas)
    () => fetch('https://corsproxy.io/?url=' + encodeURIComponent(url)),
    // 5) thingproxy
    () => fetch('https://thingproxy.freeboard.io/fetch/' + url),
  ];

  let ultimoErro = null;
  for (const tentar of estrategias) {
    try {
      const res = await tentar();
      if (res && res.ok) {
        const txt = await res.text();
        if (txt && txt.trim().startsWith('{')) {
          return JSON.parse(txt);
        }
      }
    } catch(e) { ultimoErro = e; }
  }
  throw new Error('Todos os métodos de conexão falharam' + (ultimoErro ? ': ' + ultimoErro.message : ''));
}

async function buscarEditaisPNCP(diasAtras, uf) {
  const hoje = new Date();
  const inicio = new Date();
  inicio.setDate(hoje.getDate() - diasAtras);

  const fmt = d => d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  const dataFinal = fmt(hoje);
  const dataInicial = fmt(inicio);

  // 6=Pregão Eletrônico, 8=Dispensa, 4=Concorrência Eletrônica, 1=Leilão
  const modalidades = [6, 8, 4];
  let todos = [];

  for (const mod of modalidades) {
    let pagina = 1;
    let totalPaginas = 1;

    while (pagina <= totalPaginas && pagina <= 5) {
      let url = `${PNCP_BASE}/contratacoes/publicacao?dataInicial=${dataInicial}&dataFinal=${dataFinal}&codigoModalidadeContratacao=${mod}&tamanhoPagina=50&pagina=${pagina}`;
      if (uf) url += `&uf=${uf}`;

      try {
        const json = await fetchPNCP(url);
        totalPaginas = json.totalPaginas || 1;
        const itens = json.data || [];
        todos = todos.concat(itens);
        pagina++;
      } catch(e) {
        console.error('Erro modalidade', mod, e);
        break;
      }
    }
  }

  // Filtrar por palavras-chave VRF no objeto da compra
  const filtrados = todos.filter(item => {
    const obj = (item.objetoCompra || '').toLowerCase();
    return KEYWORDS_VRF.some(kw => obj.includes(kw));
  });

  // Remover duplicados por numeroControlePNCP
  const vistos = new Set();
  const unicos = [];
  for (const e of filtrados) {
    const id = e.numeroControlePNCP || JSON.stringify(e);
    if (!vistos.has(id)) { vistos.add(id); unicos.push(e); }
  }

  return unicos;
}

function formatarEdital(edital) {
  const valor = edital.valorTotalEstimado
    ? 'R$ ' + Number(edital.valorTotalEstimado).toLocaleString('pt-BR', {minimumFractionDigits:2})

  const abertura = edital.dataAberturaProposta
    ? new Date(edital.dataAberturaProposta).toLocaleDateString('pt-BR') : '—';
  const encerramento = edital.dataEncerramentoProposta
    ? new Date(edital.dataEncerramentoProposta).toLocaleDateString('pt-BR') : '—';
  const modalidade = edital.modalidadeNome || '—';
  const orgao = edital.unidadeOrgao?.nomeUnidade || edital.orgaoEntidade?.razaoSocial || '—';
  const uf = edital.unidadeOrgao?.ufSigla || '—';
  const municipio = edital.unidadeOrgao?.municipioNome || '';
  const link = edital.linkSistemaOrigem || edital.linkProcessoEletronico || '#';
  const numero = edital.numeroControlePNCP || '—';

  return `
    <div style="background:#f0f9fb;border:1px solid #b8e0ea;border-radius:10px;padding:12px 14px;margin-top:10px;font-size:13px;">
      <div style="font-weight:700;color:#1a5f6e;margin-bottom:8px;font-size:13px;line-height:1.4;">${edital.objetoCompra || 'Sem descrição'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:8px;color:#2a4a50;">
        <div><b>Valor:</b><br>${valor}</div>
        <div><b>Local:</b><br>${municipio ? municipio+'/' : ''}${uf}</div>
        <div><b>Abertura:</b><br>${abertura}</div>
        <div><b>Encerramento:</b><br>${encerramento}</div>
        <div style="grid-column:1/-1"><b>Modalidade:</b> ${modalidade}</div>
        <div style="grid-column:1/-1"><b>Órgão:</b> ${orgao}</div>
        <div style="grid-column:1/-1"><b>Nº PNCP:</b> ${numero}</div>
      </div>
      ${link !== '#' ? `<a href="${link}" target="_blank" style="display:inline-block;background:#1a5f6e;color:white;padding:6px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;">Acessar edital ↗</a>` : '<span style="color:#888;font-size:12px">Link não disponível</span>'}
    </div>`;
}

// Detecta UF no comando — sigla, nome completo ou sigla isolada
function detectarUF(comando) {
  const texto = comando.toUpperCase().trim();

  const nomes = {
    'MATO GROSSO DO SUL':'MS','RIO GRANDE DO NORTE':'RN','RIO GRANDE DO SUL':'RS',
    'RIO DE JANEIRO':'RJ','DISTRITO FEDERAL':'DF','ESPIRITO SANTO':'ES','ESPÍRITO SANTO':'ES',
    'SANTA CATARINA':'SC','MINAS GERAIS':'MG','MATO GROSSO':'MT','SAO PAULO':'SP','SÃO PAULO':'SP',
    'MARANHAO':'MA','MARANHÃO':'MA','PARAIBA':'PB','PARAÍBA':'PB','RONDONIA':'RO','RONDÔNIA':'RO',
    'TOCANTINS':'TO','RORAIMA':'RR','AMAZONAS':'AM','SERGIPE':'SE','ALAGOAS':'AL','PIAUI':'PI','PIAUÍ':'PI',
    'PARANA':'PR','PARANÁ':'PR','PERNAMBUCO':'PE','GOIAS':'GO','GOIÁS':'GO','CEARA':'CE','CEARÁ':'CE',
    'BAHIA':'BA','AMAPA':'AP','AMAPÁ':'AP','ACRE':'AC','PARA':'PA','PARÁ':'PA'
  };
  for (const nome of Object.keys(nomes)) {
    if (texto.includes(nome)) return nomes[nome];
  }

  const ufs = ['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];
  for (const uf of ufs) {
    if (new RegExp(`\\b(EM|NO|NA|DE|UF:?)\\s+${uf}\\b`).test(texto)) return uf;
    if (new RegExp(`/${uf}\\b`).test(texto)) return uf;
  }

  const excluir = ['PAIS','PAÍS','ESTA','ESTE','ESSA','PARA','MAIS','DICA'];
  for (const uf of ufs) {
    if (new RegExp(`(^|\\s)${uf}($|\\s)`).test(texto)) {
      let falso = false;
      for (const ex of excluir) {
        if (ex.includes(uf) && texto.includes(ex)) falso = true;
      }
      if (!falso) return uf;
    }
  }
  return '';
}

const BUSCA_TRIGGERS = [
  'buscar edital', 'busca edital', 'buscar editais', 'buscar licitaç', 'busca licitaç',
  'procurar edital', 'editais de vrf', 'editais vrf', 'licitações de vrf', 'licitacoes de vrf',
  'buscar vrf', 'busca vrf', 'mostrar edital', 'listar edital', 'pesquisar edital', 'pncp',
  'me manda licitaç', 'me mostre edital', 'quero ver edital', 'tem edital', 'tem licitaç',
  'procura licitaç', 'acha edital', 'busca de edital'
];

// Rastrear último contexto — se estava em modo busca, continuações também são busca
let _ultimoContexto = null; // 'busca' ou null
let _ultimaUF = '';
let _ultimosDias = 30;

function isBuscaComando(texto) {
  const t = texto.toLowerCase();
  // Verificar trigger direto
  if (BUSCA_TRIGGERS.some(trigger => t.includes(trigger))) return true;

  // Verificar se é continuação de busca (contexto)
  if (_ultimoContexto === 'busca') {
    const continuacoes = [
      'agora', 'nos últimos', 'nos ultimos', 'últimos', 'ultimos',
      'refaz', 'refaça', 'tenta de novo', 'mais', 'mesmo', 'igual',
      'amplia', 'ampliar', 'aumenta', 'só que', 'mas agora',
      'desta vez', 'dessa vez', 'agora com', 'faça com', 'faz com',
      'em vez de', 'ao invés', 'muda para', 'muda pra', 'troca para', 'troca pra',
      'dias', 'semana', 'mês', 'mes'
    ];
    if (continuacoes.some(c => t.includes(c))) return true;
  }
  return false;
}

// ─── HISTÓRICO DE CONVERSAS (localStorage) ───
const STORAGE_KEY = 'eliteia_conversations';
const MAX_CONVERSATIONS = 50;

let currentConversationId = null;

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function loadAllConversations() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch(e) { return []; }
}

function saveAllConversations(convs) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(convs.slice(0, MAX_CONVERSATIONS)));
  } catch(e) { console.error('Erro ao salvar:', e); }
}

function getCurrentConversation() {
  const all = loadAllConversations();
  return all.find(c => c.id === currentConversationId) || null;
}

function saveCurrentConversation(title) {
  if (!currentConversationId) return;
  const all = loadAllConversations();
  const idx = all.findIndex(c => c.id === currentConversationId);
  const conv = {
    id: currentConversationId,
    title: title || 'Conversa sem título',
    messages: conversationHistory,
    renderedHTML: getRenderedMessages(),
    updatedAt: Date.now()
  };
  if (idx >= 0) all[idx] = conv;
  else all.unshift(conv);
  // Ordenar por mais recente
  all.sort((a, b) => b.updatedAt - a.updatedAt);
  saveAllConversations(all);
  renderRecentsList();
}

function getRenderedMessages() {
  const container = document.getElementById('chat-messages');
  const msgs = container.querySelectorAll('.msg');
  const result = [];
  msgs.forEach(m => {
    const role = m.classList.contains('user') ? 'user' : 'ai';
    const bubble = m.querySelector('.bubble');
    result.push({ role, html: bubble ? bubble.innerHTML : '' });
  });
  return result;
}

function generateTitle(text) {
  // Pega as primeiras palavras da primeira mensagem do usuário
  return text.replace(/[^a-zA-ZÀ-ú0-9 ]/g, '').trim().substring(0, 40) || 'Nova Conversa';
}

function startNewConversation() {
  currentConversationId = generateId();
  conversationHistory = [];
  resetMessages();
}

function openConversation(id) {
  const all = loadAllConversations();
  const conv = all.find(c => c.id === id);
  if (!conv) return;

  currentConversationId = id;
  conversationHistory = conv.messages || [];

  // Restaurar mensagens renderizadas
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';

  if (conv.renderedHTML && conv.renderedHTML.length > 0) {
    conv.renderedHTML.forEach(m => {
      const div = document.createElement('div');
      div.className = `msg ${m.role === 'user' ? 'user' : 'ai'}`;
      const sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = m.role === 'user' ? 'Você' : 'Elite IA';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = m.html;
      div.appendChild(sender);
      div.appendChild(bubble);
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  } else {
    resetMessages();
  }

  closeSidebar();
  renderRecentsList();
}

function deleteConversation(id, e) {
  e.stopPropagation();
  const all = loadAllConversations().filter(c => c.id !== id);
  saveAllConversations(all);
  if (currentConversationId === id) startNewConversation();
  renderRecentsList();
}

function renderRecentsList() {
  const container = document.getElementById('sidebar-recents');
  const all = loadAllConversations();

  if (all.length === 0) {
    container.innerHTML = '<div style="padding:8px 20px;font-size:12px;color:rgba(255,255,255,0.3)">Nenhuma conversa salva</div>';
    return;
  }

  container.innerHTML = all.map(conv => {
    const isActive = conv.id === currentConversationId;
    const date = new Date(conv.updatedAt);
    const dateStr = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
    return `
      <div onclick="openConversation('${conv.id}')" style="
        display:flex;align-items:center;justify-content:space-between;
        padding:9px 20px;cursor:pointer;transition:background 0.15s;
        background:${isActive ? 'rgba(58,181,204,0.1)' : 'transparent'};
      " onmouseover="this.style.background='rgba(255,255,255,0.05)'" 
         onmouseout="this.style.background='${isActive ? 'rgba(58,181,204,0.1)' : 'transparent'}'">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;color:${isActive ? 'var(--teal-glow)' : 'rgba(255,255,255,0.75)'};
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${conv.title}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px">${dateStr}</div>
        </div>
        <button onclick="deleteConversation('${conv.id}', event)" style="
          background:none;border:none;color:rgba(255,255,255,0.25);
          cursor:pointer;padding:4px;margin-left:8px;flex-shrink:0;
          font-size:14px;line-height:1;transition:color 0.2s;
        " onmouseover="this.style.color='#ff7b7b'" onmouseout="this.style.color='rgba(255,255,255,0.25)'">×</button>
      </div>`;
  }).join('');
}

// Interceptar addMessage para salvar automaticamente
const _origAddMessage = addMessage;
let _firstUserMessage = '';
addMessage = function(role, content, isHTML) {
  _origAddMessage(role, content, isHTML);

  }
};

// ── ELITE IA THINKING STREAM ──
const _TS_FLAKE = `<svg viewBox="0 0 24 24" fill="none" stroke="#3ab5cc" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/><circle cx="12" cy="12" r="2.5" fill="#3ab5cc"/></svg>`;
const _TS_SHIELD = `<svg class="sh-bg" viewBox="0 0 100 115" fill="none"><path d="M50 5 L90 22 L90 58 C90 80 72 100 50 108 C28 100 10 80 10 58 L10 22 Z" stroke="#3ab5cc" stroke-width="7" stroke-linejoin="round"/></svg>`;

function _buildTsShield() {
  return `<div class="ts-shield">
    ${_TS_SHIELD}
    <div class="ts-scene">
      <div class="ts-trail"></div><div class="ts-trail"></div>
      <div class="ts-trail"></div><div class="ts-trail"></div>
      <div class="ts-trail"></div>
      <div class="ts-fk">${_TS_FLAKE}</div>
      <div class="ts-fk">${_TS_FLAKE}</div>
      <div class="ts-fk">${_TS_FLAKE}</div>
    </div>
    <div class="ts-fk-fixed">${_TS_FLAKE}</div>
  </div>`;
}

async function mostrarThinkingStream(container, etapas) {
  const wrap = document.createElement('div');
  wrap.className = 'ts-wrap';

  const shieldDiv = document.createElement('div');
  shieldDiv.innerHTML = _buildTsShield();
  const shieldEl = shieldDiv.firstElementChild;
  wrap.appendChild(shieldEl);

  const col = document.createElement('div');
  col.className = 'ts-col';
  col.innerHTML = '<div class="ts-label">Elite IA</div><div class="ts-msg"></div>';
  wrap.appendChild(col);

  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;

  const msgEl = col.querySelector('.ts-msg');

  for (let i = 0; i < etapas.length; i++) {
    const { texto, duracao } = etapas[i];
    if (i > 0) {
      msgEl.classList.add('fade');
      await new Promise(r => setTimeout(r, 280));
    }
    msgEl.textContent = texto;
    msgEl.classList.remove('fade');
    container.scrollTop = container.scrollHeight;
    await new Promise(r => setTimeout(r, duracao));
  }

  shieldEl.classList.add('done');
  msgEl.classList.add('fade');
  await new Promise(r => setTimeout(r, 300));
  wrap.remove();
}

async function executarBuscaEditais(comando) {
  // Detectar UF — se não informada, herdar da última busca
  let ufDetectada = detectarUF(comando);
  if (!ufDetectada && _ultimoContexto === 'busca' && _ultimaUF) {
    ufDetectada = _ultimaUF; // herda UF da busca anterior
  }

  // Detectar período — se não informado, herdar
  let dias = 0;
  const c = comando.toLowerCase();
  if (c.includes('hoje') || c.includes('24h')) dias = 2;
  else if (c.includes('semana') || c.includes('7 dias') || c.includes('sete dias')) dias = 7;
  else if (c.includes('15 dias') || c.includes('quinze')) dias = 15;
  else if (c.includes('60 dias') || c.includes('2 meses') || c.includes('sessenta')) dias = 60;
  else if (c.includes('90 dias') || c.includes('3 meses') || c.includes('noventa') || c.includes('trimestre')) dias = 90;
  else if (c.includes('30 dias') || c.includes('trinta') || c.includes('mes') || c.includes('mês')) dias = 30;

  // Se não detectou período, herdar do contexto anterior
  if (!dias) dias = (_ultimoContexto === 'busca' && _ultimosDias) ? _ultimosDias : 30;

  // Salvar contexto atual
  _ultimoContexto = 'busca';
  _ultimaUF = ufDetectada;
  _ultimosDias = dias;

  const container = document.getElementById('chat-messages');

  const etapas = [
    { texto: 'Analisando pedido...', duracao: 800 },
    { texto: `Acessando portal PNCP${ufDetectada ? ' · ' + ufDetectada : ' · Todo o Brasil'}`, duracao: 1000 },
    { texto: `Filtrando editais de VRF — últimos ${dias} dias`, duracao: 900 },
    { texto: 'Processando modalidades de contratação...', duracao: 800 },
  ];

  await mostrarThinkingStream(container, etapas);

  try {
    const editais = await buscarEditaisPNCP(dias, ufDetectada);
    if (editais.length === 0) {
      addMessage('assistant', `Nenhum edital de VRF encontrado nos últimos ${dias} dias${ufDetectada ? ' em ' + ufDetectada : ' em todo o Brasil'}. Tente ampliar o período ou remover o filtro de estado.`);
      return true;
    }
    editais.sort((a, b) => (b.valorTotalEstimado || 0) - (a.valorTotalEstimado || 0));
    const top = editais.slice(0, 15);
    let out = `<strong>✅ ${editais.length} edital(is) VRF encontrado(s) — exibindo ${top.length}:</strong>`;
    for (const e of top) out += formatarEdital(e);
    addMessage('assistant', out, true);
  } catch(err) {
    addMessage('assistant', '⚠️ Erro ao acessar o PNCP. Tente novamente em instantes.');
  }
  return true;
}


// ── INTERPRETAÇÃO INTELIGENTE DE INTENÇÃO VIA IA ──
// A IA lê a mensagem + contexto e decide se é busca de editais
async function interpretarIntencao(texto) {
  const contexto = _ultimoContexto === 'busca'
    ? `\n\nContexto: o usuário estava buscando editais de VRF${_ultimaUF ? ' em ' + _ultimaUF : ''}${_ultimosDias ? ' nos últimos ' + _ultimosDias + ' dias' : ''}.`
    : '';

  const prompt = `Analise a mensagem do usuário e responda APENAS com JSON válido, sem texto extra.

Mensagem: "${texto}"${contexto}

Determine:
1. É uma solicitação de busca/pesquisa de editais ou licitações de VRF/ar condicionado/climatização?
2. Qual UF/estado foi mencionado? (sigla de 2 letras ou vazio)
3. Quantos dias para trás buscar? (número inteiro, padrão 30 se não especificado)

Responda SOMENTE com este JSON:
{"ehBusca": true/false, "uf": "GO" ou "", "dias": 30}

Exemplos:
"buscar editais VRF em Goiás" → {"ehBusca": true, "uf": "GO", "dias": 30}
"agora somente em Goiás" → {"ehBusca": true, "uf": "GO", "dias": 30}
"nos últimos 60 dias" → {"ehBusca": true, "uf": "", "dias": 60}
"o que é VRF?" → {"ehBusca": false, "uf": "", "dias": 0}
"quais documentos preciso?" → {"ehBusca": false, "uf": "", "dias": 0}
"me manda as licitações de SP" → {"ehBusca": true, "uf": "SP", "dias": 30}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '{"ehBusca":false,"uf":"","dias":30}';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Herdar contexto anterior se não especificado
    if (parsed.ehBusca) {
      if (!parsed.uf && _ultimoContexto === 'busca' && _ultimaUF) parsed.uf = _ultimaUF;
      if (!parsed.dias || parsed.dias === 30) {
        if (_ultimoContexto === 'busca' && _ultimosDias && _ultimosDias !== 30) {
          parsed.dias = _ultimosDias;
        }
      }
      // Se o texto menciona explicitamente um número de dias, usa esse
      const diasMatch = texto.match(/(\d+)\s*dias?/i);
      if (diasMatch) parsed.dias = parseInt(diasMatch[1]);
    }

    return parsed;
  } catch(e) {
    // Fallback: usar lógica antiga se a IA falhar
    return {
      ehBusca: isBuscaComando(texto),
      uf: detectarUF(texto) || (_ultimoContexto === 'busca' ? _ultimaUF : ''),
      dias: _ultimosDias || 30
    };
  }
}

// ── BUSCA COM INTENÇÃO INTERPRETADA PELA IA ──
async function executarBuscaEditaisInteligente(intencao) {
  const { uf: ufDetectada, dias } = intencao;
  const container = document.getElementById('chat-messages');

  // Thinking stream — fica ativo até o resultado chegar de verdade
  const wrap = document.createElement('div');
  wrap.className = 'ts-wrap';
  const shieldDiv = document.createElement('div');
  shieldDiv.innerHTML = _buildTsShield();
  const shieldEl = shieldDiv.firstElementChild;
  wrap.appendChild(shieldEl);
  const col = document.createElement('div');
  col.className = 'ts-col';
  col.innerHTML = '<div class="ts-label">Elite IA</div><div class="ts-msg"></div>';
  wrap.appendChild(col);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  const msgEl = col.querySelector('.ts-msg');

  // Função para atualizar texto com fade
  async function setMsg(texto) {
    msgEl.classList.add('fade');
    await new Promise(r => setTimeout(r, 250));
    msgEl.textContent = texto;
    msgEl.classList.remove('fade');
    container.scrollTop = container.scrollHeight;
  }

  await setMsg('Analisando pedido...');
  await new Promise(r => setTimeout(r, 700));

  await setMsg(`Acessando portal PNCP${ufDetectada ? ' · ' + ufDetectada : ' · Todo o Brasil'}`);
  await new Promise(r => setTimeout(r, 800));

  await setMsg(`Filtrando editais de VRF — últimos ${dias} dias`);
  // NÃO esperar tempo fixo aqui — a busca começa agora e o stream fica ativo

  try {
    // Iniciar busca real enquanto stream está ativo
    const [editais] = await Promise.all([
      buscarEditaisPNCP(dias, ufDetectada),
      new Promise(r => setTimeout(r, 600)) // mínimo de tempo nesta etapa
    ]);

    await setMsg('Processando e organizando resultados...');
    await new Promise(r => setTimeout(r, 500));

    // Agora sim encerrar o stream
    shieldEl.classList.add('done');
    msgEl.classList.add('fade');
    await new Promise(r => setTimeout(r, 300));
    wrap.remove();

    if (editais.length === 0) {
      addMessage('assistant', `Nenhum edital de VRF encontrado nos últimos ${dias} dias${ufDetectada ? ' em ' + ufDetectada : ' em todo o Brasil'}. Tente ampliar o período ou remover o filtro de estado.`);
      return;
    }

    editais.sort((a, b) => (b.valorTotalEstimado || 0) - (a.valorTotalEstimado || 0));
    const top = editais.slice(0, 15);
    let out = `<strong>✅ ${editais.length} edital(is) VRF encontrado(s) — exibindo ${top.length}:</strong>`;
    for (const e of top) out += formatarEdital(e);
    addMessage('assistant', out, true);

  } catch(err) {
    shieldEl.classList.add('done');
    msgEl.classList.add('fade');
    await new Promise(r => setTimeout(r, 200));
    wrap.remove();
    addMessage('assistant', '⚠️ Erro ao acessar o PNCP. Verifique sua conexão e tente novamente.');
  }
}

// ── MICROFONE iOS/Safari ──
// Substituir a função existente por versão compatível com Safari
(function() {
  // No iOS Safari, a Speech Recognition precisa ser iniciada
  // dentro de um evento de toque direto do usuário
  const micBtnEl = document.querySelector ? null : null; // será buscado ao clicar
  window._startVoiceRecording = function() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert('Reconhecimento de voz não suportado. Use Safari no iOS 15+ ou Chrome.');
      return;
    }

    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    const micBtn = document.querySelector('.btn-mic');

    rec.onstart = () => {
      if (micBtn) {
        micBtn.style.color = '#ff6b6b';
        micBtn.style.transform = 'scale(1.2)';
      }
    };

    rec.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      const inp = document.getElementById('msg-input');
      if (inp) {
        inp.value = transcript;
        autoResize(inp);
        inp.focus();
      }
      if (micBtn) {
        micBtn.style.color = '';
        micBtn.style.transform = '';
      }
      setTimeout(() => {
        const current = document.getElementById('msg-input');
        if (current && current.value.trim()) sendMessage();
      }, 500);
    };

    rec.onerror = (event) => {
      if (micBtn) {
        micBtn.style.color = '';
        micBtn.style.transform = '';
      }
      if (event.error === 'not-allowed') {
        alert('Acesso ao microfone negado. Permita nas configurações do Safari.');
      } else if (event.error !== 'no-speech') {
        alert('Erro no microfone: ' + event.error);
      }
    };

    rec.onend = () => {
      if (micBtn) {
        micBtn.style.color = '';
        micBtn.style.transform = '';
      }
    };

    try {
      rec.start();
    } catch(e) {
      alert('Não foi possível iniciar o microfone: ' + e.message);
    }
  };
})();
